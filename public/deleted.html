<!DOCTYPE html>
<html>

<head>
<title>Удаленные</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Удаленные заявки</h2>

<a href="admin.html">Назад</a>

<table>

<thead>

<tr>
<th>Имя</th>
<th>Телефон</th>
<th>Дата</th>
<th>Время</th>
<th></th>
<th></th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

<script>

async function load(){

const res=await fetch("/api/deleted")
const data=await res.json()

const table=document.getElementById("table")
table.innerHTML=""

data.forEach(b=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${b.name}</td>
<td>${b.phone}</td>
<td>${b.date}</td>
<td>${b.time}</td>

<td><button onclick="restore(${b.id})">Восстановить</button></td>

<td><button onclick="deleteForever(${b.id})">Удалить навсегда</button></td>

`

table.appendChild(tr)

})

}

async function restore(id){

await fetch("/api/restore/"+id,{method:"POST"})
load()

}

async function deleteForever(id){

if(!confirm("Удалить навсегда?")) return

await fetch("/api/deleted/"+id,{method:"DELETE"})
load()

}

load()

</script>

</body>
</html>
