<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Удалённые заявки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Удалённые заявки</h2>

  <button onclick="window.location.href='admin.html'">Назад к активным заявкам</button>

  <table id="deletedTable">
    <thead>
      <tr>
        <th>Имя</th>
        <th>Контакт</th>
        <th>Дата</th>
        <th>Время</th>
        <th>Комментарий</th>
        <th>Дата удаления</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadDeletedBookings() {
      const response = await fetch('/api/deleted_bookings');
      const bookings = await response.json();

      const tbody = document.querySelector('#deletedTable tbody');
      tbody.innerHTML = '';
      bookings.forEach(b => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${b.name}</td>
          <td>${b.contact}</td>
          <td>${b.date}</td>
          <td>${b.time}</td>
          <td>${b.comment}</td>
          <td>${b.deleted_at}</td>
        `;
        tbody.appendChild(row);
      });
    }

    loadDeletedBookings();
  </script>
</body>
</html>
