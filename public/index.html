<!DOCTYPE html>
<html>
<head>

<title>Запись</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Онлайн запись</h2>

<form id="form">

<input id="name" placeholder="Имя" required>

<input id="phone" placeholder="Телефон" required>

<label>Дата</label>
<input type="date" id="date" required>

<label>Время</label>
<select id="time"></select>

<textarea id="comment" placeholder="Комментарий" maxlength="300"></textarea>

<div id="counter">0 / 300</div>

<button type="submit">Записаться</button>

</form>

<script>

const dateInput=document.getElementById("date")
const timeSelect=document.getElementById("time")
const comment=document.getElementById("comment")
const counter=document.getElementById("counter")

// запрет прошлой и текущей даты
const tomorrow=new Date()
tomorrow.setDate(tomorrow.getDate()+1)
dateInput.min=tomorrow.toISOString().split("T")[0]

// счётчик комментария
comment.addEventListener("input",()=>{

counter.textContent=comment.value.length+" / 300"

})

// загрузка настроек
async function loadSettings(){

const res=await fetch("/api/settings")
const settings=await res.json()

for(let h=settings.start_hour;h<=settings.end_hour;h++){

const option=document.createElement("option")

option.value=h+":00"
option.textContent=h+":00"

timeSelect.appendChild(option)

}

}

loadSettings()

// отправка формы
document.getElementById("form").onsubmit=async(e)=>{

e.preventDefault()

const data={

name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
date:dateInput.value,
time:timeSelect.value,
comment:comment.value

}

const res=await fetch("/api/bookings",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

})

if(res.ok){

alert("Запись создана")

}else{

alert("Это время занято")

}

}

</script>

</body>
</html>
