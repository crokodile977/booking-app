<!DOCTYPE html>
<html>

<head>

<title>Запись</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Онлайн запись</h2>

<form id="form">

<input id="name" placeholder="Имя" required>

<input id="phone" placeholder="Телефон" required>

<label>Услуга</label>
<select id="service"></select>

<label>Дата</label>
<input type="date" id="date" required>

<label>Время</label>
<select id="time"></select>

<textarea id="comment" maxlength="300" placeholder="Комментарий"></textarea>

<div id="counter">0 / 300</div>

<button type="submit">Записаться</button>

</form>

<script>

const dateInput=document.getElementById("date")
const timeSelect=document.getElementById("time")
const serviceSelect=document.getElementById("service")
const comment=document.getElementById("comment")
const counter=document.getElementById("counter")

const tomorrow=new Date()
tomorrow.setDate(tomorrow.getDate()+1)
dateInput.min=tomorrow.toISOString().split("T")[0]

comment.addEventListener("input",()=>{
counter.textContent=comment.value.length+" / 300"
})

async function loadServices(){

const res=await fetch("/api/services")
const services=await res.json()

services.forEach(s=>{
const option=document.createElement("option")
option.value=s.name
option.textContent=s.name
serviceSelect.appendChild(option)
})

}

async function loadSettings(){

const res=await fetch("/api/settings")
const settings=await res.json()

for(let h=settings.start_hour;h<=settings.end_hour;h++){

const option=document.createElement("option")

option.value=h+":00"
option.textContent=h+":00"

timeSelect.appendChild(option)

}

}

async function checkBusy(){

const date=dateInput.value
if(!date) return

const res=await fetch("/api/busy?date="+date)
const busy=await res.json()

const options=[...timeSelect.options]

options.forEach(o=>o.disabled=false)

busy.forEach(b=>{

options.forEach(o=>{
if(o.value===b.time){
o.disabled=true
}
})

})

}

dateInput.addEventListener("change",checkBusy)

document.getElementById("form").onsubmit=async(e)=>{

e.preventDefault()

const data={

name:name.value,
phone:phone.value,
service:serviceSelect.value,
date:dateInput.value,
time:timeSelect.value,
comment:comment.value

}

const res=await fetch("/api/bookings",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)

})

if(res.ok){
alert("Запись создана")
}else{
alert("Это время занято")
}

}

loadServices()
loadSettings()

</script>

</body>
</html>
