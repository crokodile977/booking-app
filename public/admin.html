<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заявки для исполнителя</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Все заявки</h2>

  <div>
    <label>Поиск по имени:</label>
    <input type="text" id="searchInput" oninput="loadBookings()">
    <label>Фильтр по дате:</label>
    <input type="date" id="filterDate" onchange="loadBookings()">
  </div>
<button onclick="window.location.href='deleted.html'">Удалённые заявки</button>
  <table id="bookingsTable">
    <thead>
      <tr>
        <th>Имя</th>
        <th>Контакт</th>
        <th>Дата</th>
        <th>Время</th>
        <th>Комментарий</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadBookings() {
      const response = await fetch('/api/bookings');
      let bookings = await response.json();

      const search = document.getElementById('searchInput').value.toLowerCase();
      const filterDate = document.getElementById('filterDate').value;

      if (search) {
        bookings = bookings.filter(b => b.name.toLowerCase().includes(search));
      }
      if (filterDate) {
        bookings = bookings.filter(b => b.date === filterDate);
      }

      const tbody = document.querySelector('#bookingsTable tbody');
      tbody.innerHTML = '';
      bookings.forEach(b => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${b.name}</td>
          <td>${b.contact}</td>
          <td>${b.date}</td>
          <td>${b.time}</td>
          <td>${b.comment}</td>
          <td><button onclick="deleteBooking(${b.id})">Удалить</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    async function deleteBooking(id) {
      if (!confirm('Вы точно хотите удалить эту заявку?')) return;

      const res = await fetch(`/api/bookings/${id}`, { method: 'DELETE' });
      if (res.ok) {
        alert('Заявка удалена');
        loadBookings();
      } else {
        alert('Ошибка при удалении');
      }
    }

    loadBookings();
  </script>
</body>
</html>
