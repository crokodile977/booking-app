<!DOCTYPE html>
<html>

<head>
<title>Админ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Заявки</h2>

<a href="deleted.html">Удаленные заявки</a>

<table>

<thead>
<tr>
<th>Имя</th>
<th>Телефон</th>
<th>Дата</th>
<th>Время</th>
<th></th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<h2>Настройки графика</h2>

<label>Начало работы</label>
<input id="start" type="number">

<label>Конец работы</label>
<input id="end" type="number">

<label>Рабочие дни (1-7 через запятую)</label>
<input id="days">

<button onclick="saveSettings()">Сохранить</button>

<script>

async function load(){

const res=await fetch("/api/bookings")
const data=await res.json()

const table=document.getElementById("table")
table.innerHTML=""

data.forEach(b=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${b.name}</td>
<td>${b.phone}</td>
<td>${b.date}</td>
<td>${b.time}</td>
<td><button onclick="remove(${b.id})">Удалить</button></td>

`

table.appendChild(tr)

})

}

async function remove(id){

if(!confirm("Удалить заявку?")) return

await fetch("/api/bookings/"+id,{method:"DELETE"})

load()

}

async function saveSettings(){

const start=document.getElementById("start").value
const end=document.getElementById("end").value
const days=document.getElementById("days").value

await fetch("/api/settings",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({start,end,days})

})

alert("Сохранено")

}

load()

</script>

</body>
</html>
